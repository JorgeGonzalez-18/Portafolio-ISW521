<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario de Clases ISW</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #444;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #3a86ff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Horario de clases de ISW</h2>

    <table>
        <thead>
            <tr>
                <th>Hora</th>
                <th>Lunes</th>
                <th>Martes</th>
                <th>Miércoles</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>7:00</td>
                <td>ISW-521</td>
                <td>ISW-311</td>
                <td>Libre</td>
            </tr>
            <tr>
                <td>9:00</td>
                <td colspan="3" style="text-align: center; font-weight: bold;">Receso</td>
            </tr>
            <tr>
                <td>10:00</td>
                <td>ISW-421</td>
                <td>ISW-521</td>
                <td>ISW-311</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
